<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NYC District Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
    body {
        margin: 0;
        padding: 0;
    }
    #map {
        height: 100vh;
        width: 100%;
    }
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ----------------------
// MAP INIT
// ----------------------
var map = L.map('map').setView([40.73, -73.98], 12);

// Base layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'NYC Map'
}).addTo(map);

// ----------------------
// DISTRICTS DATA
// ----------------------
const districts = [
    {
        name: "Soho",
        color: "#00ff00",
        coords: [
            [40.724, -74.002],
            [40.725, -73.995],
            [40.720, -73.995],
            [40.720, -74.002]
        ]
    },
    {
        name: "Midtown",
        color: "#0000ff",
        coords: [
            [40.760, -73.990],
            [40.760, -73.975],
            [40.750, -73.975],
            [40.750, -73.990]
        ]
    },
    {
        name: "Brooklyn Test Area",
        color: "#ff0000",
        coords: [
            [40.695, -73.990],
            [40.695, -73.980],
            [40.690, -73.980],
            [40.690, -73.990]
        ]
    }
];

// ----------------------
// DRAW ON MAP
// ----------------------
districts.forEach(d => {

    let polygon = L.polygon(d.coords, {
        color: d.color,
        fillColor: d.color,
        fillOpacity: 0.35,
        weight: 2
    }).addTo(map);

    polygon.bindPopup("<b>" + d.name + "</b>");

});

</script>

</body>
</html>
