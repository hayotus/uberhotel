```html
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manhattan Real Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f2eb;
}
#map{
  height:100vh;
  width:100%;
}
.popup-title{
  font-weight:600;
  font-size:14px;
}
.go-btn{
  display:inline-block;
  margin-top:8px;
  padding:7px 12px;
  background:#378add;
  color:#fff;
  border-radius:6px;
  text-decoration:none;
  font-size:13px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Manhattan locations
const places = [
  {name:"Times Square",lat:40.7580,lng:-73.9855},
  {name:"Central Park",lat:40.7829,lng:-73.9654},
  {name:"Wall Street",lat:40.7060,lng:-74.0086},
  {name:"5th Avenue",lat:40.7750,lng:-73.9655},
  {name:"Grand Central Terminal",lat:40.7527,lng:-73.9772},
  {name:"Bryant Park",lat:40.7536,lng:-73.9832},
  {name:"SoHo",lat:40.7233,lng:-74.0030},
  {name:"Hudson Yards",lat:40.7540,lng:-74.0027},
  {name:"High Line",lat:40.7479,lng:-74.0049},
  {name:"Chinatown",lat:40.7158,lng:-73.9970},
];

// map init
const map = L.map('map').setView([40.7580, -73.9855], 12);

// tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
}).addTo(map);

// markers
places.forEach(p => {

  const marker = L.marker([p.lat, p.lng]).addTo(map);

  // Google Maps direction
  const googleLink = `https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`;

  // Apple Maps (iPhone)
  const appleLink = `http://maps.apple.com/?daddr=${p.lat},${p.lng}`;

  marker.bindPopup(`
    <div class="popup-title">${p.name}</div>
    <a class="go-btn" href="${googleLink}" target="_blank">GO (Google)</a><br>
    <a class="go-btn" href="${appleLink}">GO (Apple)</a>
  `);

});
</script>

</body>
</html>
```
