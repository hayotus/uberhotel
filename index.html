<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UberHotel Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0c0b0a;
      padding: 2rem;
    }

    .hotel-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,175,120,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,175,120,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .hotel-glow {
      position: fixed;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(200,165,80,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .hotel-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .hotel-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #c8a550;
      margin-bottom: 6px;
    }

    .hotel-title {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      font-weight: 600;
      color: #f2ede4;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .hotel-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px auto 28px;
      width: 180px;
    }

    .hotel-divider-line {
      flex: 1;
      height: 1px;
      background: rgba(200,165,80,0.3);
    }

    .hotel-divider-diamond {
      width: 5px;
      height: 5px;
      background: #c8a550;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .menu-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      text-decoration: none;
      border: 0.5px solid rgba(200,165,80,0.2);
      border-radius: 4px;
      transition: border-color 0.25s, background 0.25s;
      background: rgba(255,255,255,0.02);
    }

    .menu-item:hover {
      border-color: rgba(200,165,80,0.6);
      background: rgba(200,165,80,0.07);
    }

    .menu-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 3px;
      border: 0.5px solid rgba(200,165,80,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .menu-item-icon svg {
      width: 16px;
      height: 16px;
      stroke: #c8a550;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .menu-item-text {
      text-align: left;
      flex: 1;
    }

    .menu-item-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #e8e0d0;
      display: block;
      letter-spacing: 0.5px;
    }

    .menu-item-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      color: rgba(200,165,80,0.5);
      display: block;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    .menu-item-arrow svg {
      width: 14px;
      height: 14px;
      stroke: rgba(200,165,80,0.4);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s, transform 0.2s;
      display: block;
    }

    .menu-item:hover .menu-item-arrow svg {
      stroke: #c8a550;
      transform: translateX(3px);
    }

    .hotel-footer {
      margin-top: 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      color: rgba(200,165,80,0.25);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="hotel-grid"></div>
  <div class="hotel-glow"></div>

  <div class="hotel-card">
    <p class="hotel-eyebrow">Welcome to</p>
    <h1 class="hotel-title">UberHotel</h1>
    <div class="hotel-divider">
      <div class="hotel-divider-line"></div>
      <div class="hotel-divider-diamond"></div>
      <div class="hotel-divider-line"></div>
    </div>

    <div class="menu-items">

      <a href="https://hayotus.github.io/uberhotel/busyarea.html" class="menu-item">
        <div class="menu-item-icon">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
            <line x1="8" y1="10" x2="16" y2="10"/>
            <line x1="8" y1="14" x2="16" y2="14"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
          </svg>
        </div>
        <div class="menu-item-text">
          <span class="menu-item-label">Busy area</span>
          <span class="menu-item-sub">Compute & estimate</span>
        </div>
        <div class="menu-item-arrow">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>

      <a href="https://hayotus.github.io/uberhotel/calc.html" class="menu-item">
        <div class="menu-item-icon">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
            <line x1="8" y1="10" x2="16" y2="10"/>
            <line x1="8" y1="14" x2="16" y2="14"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
          </svg>
        </div>
        <div class="menu-item-text">
          <span class="menu-item-label">Calculator</span>
          <span class="menu-item-sub">Compute & estimate</span>
        </div>
        <div class="menu-item-arrow">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>
      
<a href="https://hayotus.github.io/uberhotel/ime.html" class="menu-item">
        <div class="menu-item-icon">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
            <line x1="8" y1="10" x2="16" y2="10"/>
            <line x1="8" y1="14" x2="16" y2="14"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
          </svg>
        </div>
        <div class="menu-item-text">
          <span class="menu-item-label">IME</span>
          <span class="menu-item-sub">Compute & estimate</span>
        </div>
        <div class="menu-item-arrow">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>
 <a href="https://hayotus.github.io/uberhotel/profile.html" class="menu-item">
        <div class="menu-item-icon">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
            <line x1="8" y1="10" x2="16" y2="10"/>
            <line x1="8" y1="14" x2="16" y2="14"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
          </svg>
        </div>
        <div class="menu-item-text">
          <span class="menu-item-label">Data base</span>
          <span class="menu-item-sub">Compute & estimate</span>
        </div>
        <div class="menu-item-arrow">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>
      
      <a href="https://hayotus.github.io/uberhotel/hotel.html" class="menu-item">
        <div class="menu-item-icon">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="7" width="18" height="14" rx="1"/>
            <path d="M8 7V5a4 4 0 0 1 8 0v2"/>
            <line x1="12" y1="12" x2="12" y2="16"/>
          </svg>
        </div>
        <div class="menu-item-text">
          <span class="menu-item-label">Hotel</span>
          <span class="menu-item-sub">Rooms & reservations</span>
        </div>
        <div class="menu-item-arrow">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>

      <a href="https://hayotus.github.io/uberhotel/test.html" class="menu-item">
        <div class="menu-item-icon">
          <svg viewBox="0 0 24 24">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </div>
        <div class="menu-item-text">
          <span class="menu-item-label">Test</span>
          <span class="menu-item-sub">Assessments & quizzes</span>
        </div>
        <div class="menu-item-arrow">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>


       <a href="https://hayotus.github.io/uberhotel/facescanner.html" class="menu-item">
        <div class="menu-item-icon">
          <svg viewBox="0 0 24 24">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </div>
        <div class="menu-item-text">
          <span class="menu-item-label">Facescanner</span>
          <span class="menu-item-sub">Assessments & quizzes</span>
        </div>
        <div class="menu-item-arrow">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>

    </div>
    <p class="hotel-footer">Est. 2024</p>
  </div>

</body>
</html>
