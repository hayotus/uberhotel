<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UberHotel Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(45deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        /* Orqa fondagi harakatlanuvchi doiralar */
        .background-animate {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Konteyner */
        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Tugmalar dizayni */
        .menu-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            text-decoration: none;
            color: white;
            font-size: 18px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* iPhone uchun teginish (hover) effekti */
        .menu-btn:active, .menu-btn:hover {
            background: white;
            color: #203a43;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .menu-btn:hover::before {
            left: 100%;
        }

        /* Har bir tugma uchun alohida kirish animatsiyasi */
        .btn-1 { animation: slideIn 0.8s ease-out; }
        .btn-2 { animation: slideIn 1s ease-out; }
        .btn-3 { animation: slideIn 1.2s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

    </style>
</head>
<body>

    <div class="background-animate" id="circles"></div>

    <div class="container">
        <h1>Menu</h1>
        
        <a href="https://hayotus.github.io/uberhotel/calc.html" class="menu-btn btn-1">
            🧮 Calculator
        </a>
        
        <a href="https://hayotus.github.io/uberhotel/hotel.html" class="menu-btn btn-2">
            🏨 Hotel
        </a>
        
        <a href="#" class="menu-btn btn-3">
            📝 Test
        </a>
    </div>

    <script>
        // Orqa fondagi harakatlanuvchi doiralarni yaratish-
        const circlesContainer = document.getElementById('circles');
        for (let i = 0; i < 15; i++) {
            const circle = document.createElement('div');
            circle.className = 'circle';
            const size = Math.random() * 50 + 10 + 'px';
            circle.style.width = size;
            circle.style.height = size;
            circle.style.left = Math.random() * 100 + '%';
            circle.style.top = Math.random() * 100 + '%';
            circle.style.animationDelay = Math.random() * 10 + 's';
            circle.style.animationDuration = Math.random() * 10 + 10 + 's';
            circlesContainer.appendChild(circle);
        }
    </script>
</body>
</html>
