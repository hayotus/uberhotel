<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uber Data Sequential Loader</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Uber Logo */
        .uber-logo {
            width: 80px;
            margin-bottom: 30px;
        }

        /* Protsent va Aylana */
        .progress-box {
            position: relative;
            margin-bottom: 40px;
            text-align: center;
        }

        #percent-text {
            font-size: 2.5rem;
            font-weight: bold;
            display: block;
        }

        /* Habarlar ro'yxati */
        .messages-list {
            width: 100%;
            height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 10px;
        }

        .message-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            color: #ccc;
            opacity: 0;
            transform: translateY(10px);
            animation: slideIn 0.4s forwards;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
        }

        .checkmark {
            color: #28a745;
            font-weight: bold;
            font-size: 1.2rem;
            margin-left: 10px;
        }

        /* Completed Tugmasi */
        #completed-btn {
            display: none;
            margin-top: 20px;
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        /* Rahmat habari */
        #thanks-screen {
            display: none;
            text-align: center;
        }

        /* Animatsiyalar */
        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbarni chiroyli qilish */
        .messages-list::-webkit-scrollbar { width: 3px; }
        .messages-list::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <div class="container" id="main-loader">
        <svg class="uber-logo" viewBox="0 0 244.75 84.81" fill="white">
            <path d="M244.75 42.41c0 23.42-19 42.4-42.41 42.4s-42.41-19-42.41-42.4S178.93 0 202.34 0s42.41 18.99 42.41 42.41zm-68.51 0c0 14.39 11.68 26.11 26.1 26.11S228.44 56.8 228.44 42.41 216.76 16.3 202.34 16.3s-26.1 11.72-26.1 26.11zM149.33 58.71V1.82h16.3v79.4h-16.3v-5.69a26.1 26.1 0 0 1-21.57 9.28c-14.42 0-26.1-11.72-26.1-26.11S113.34 22.6 127.76 22.6a26 26 0 0 1 21.57 10.02zm-31.27-16.3c0 14.39 11.68 26.11 26.1 26.11s26.11-11.72 26.11-26.11S158.6 16.3 144.17 16.3s-26.1 11.72-26.1 26.11zM74.19 1.82h16.3V81.2H74.19v-5.69a26.11 26.11 0 0 1-21.57 9.3c-14.42 0-26.11-11.72-26.11-26.11S38.2 22.6 52.62 22.6a26.1 26.1 0 0 1 21.57 10.02zm-31.27 16.3c0 14.39 11.68 26.11 26.1 26.11s26.11-11.72 26.11-26.11S83.45 16.3 69 16.3s-26.1 11.72-26.11 26.11zM0 1.82h16.3V81.2H0z"/>
        </svg>

        <div class="progress-box">
            <span id="percent-text">0%</span>
            <div style="color: #666; font-size: 0.8rem; margin-top: 5px;">PROCESSING DATA...</div>
        </div>

        <div class="messages-list" id="log-list">
            </div>

        <button id="completed-btn">Completed</button>
    </div>

    <div id="thanks-screen">
        <h1 style="color: #28a745; font-size: 4rem; margin-bottom: 10px;">✓</h1>
        <h2>Muvaffaqiyatli!</h2>
        <p style="color: #888; margin-top: 10px;">Barcha Uber ma'lumotlari saqlandi.</p>
    </div>

    <script>
        const logList = document.getElementById('log-list');
        const percentText = document.getElementById('percent-text');
        const completedBtn = document.getElementById('completed-btn');
        const mainLoader = document.getElementById('main-loader');
        const thanksScreen = document.getElementById('thanks-screen');

        const tasks = [
            "Uber tizimiga kirish...",
            "Profil ma'lumotlari yuklanmoqda...",
            "Safar tarixi ko'chirilmoqda...",
            "To'lov kvitansiyalari analiz qilinmoqda...",
            "GPS koordinatalari tekshirilmoqda...",
            "Haydovchi reytinglari filtrlanyapti...",
            "Xavfsizlik protokoli o'rnatilmoqda...",
            "Kesh fayllar tozalanmoqda...",
            "Server bilan sinxronizatsiya...",
            "Ma'lumotlar bazasiga yozilmoqda..."
        ];

        let currentTask = 0;
        const totalTasks = tasks.length;

        function startLoading() {
            const interval = setInterval(() => {
                if (currentTask < totalTasks) {
                    // Yangi xabar yaratish
                    const item = document.createElement('div');
                    item.className = 'message-item';
                    item.innerHTML = `<span>${tasks[currentTask]}</span><span class="checkmark">✓</span>`;
                    logList.appendChild(item);

                    // Oxiriga tushirish (scroll)
                    logList.scrollTop = logList.scrollHeight;

                    // Protsentni oshirish
                    currentTask++;
                    const progress = Math.round((currentTask / totalTasks) * 100);
                    percentText.textContent = progress + "%";

                    if (currentTask === totalTasks) {
                        setTimeout(() => {
                            completedBtn.style.display = 'block';
                        }, 500);
                    }
                } else {
                    clearInterval(interval);
                }
            }, 1000); // Har 1 soniyada bitta habar chiqadi
        }

        completedBtn.addEventListener('click', () => {
            mainLoader.style.display = 'none';
            thanksScreen.style.display = 'block';
        });

        // Jarayonni boshlash
        window.onload = startLoading;
    </script>
</body>
</html>
