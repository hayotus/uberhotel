<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uber Data Loader</title>
    <style>
        /* Asosiy stillar - iPhone UI uslubida */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000000; /* Uber qora foni */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Yuklanish ekrani konteyneri */
        .loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 350px;
        }

        /* Progress Ring (Aylana) konteyneri */
        .progress-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        /* SVG Aylana progress bari */
        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg); /* Tepadan boshlanishi uchun */
        }

        .progress-ring__circle-back {
            stroke: #333; /* Fon aylanasi ranggi */
            fill: transparent;
            stroke-width: 8;
        }

        .progress-ring__circle {
            stroke: #FFFFFF; /* To'ladigan rang (Oq) */
            fill: transparent;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear;
        }

        /* Markazdagi Uber Logotipi */
        .uber-logo {
            width: 60px;
            height: 60px;
            z-index: 10;
        }

        /* Matn effektlari zonasi */
        .status-area {
            text-align: center;
            height: 60px; /* Matn almashganda ekran o'ynamasligi uchun fixed balandlik */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .percent-text {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums; /* Raqamlar sakramasligi uchun */
        }

        .status-text {
            font-size: 0.95rem;
            color: #AAAAAA;
            opacity: 0;
            animation: fadeInOut 2.5s infinite; /* Matn o'chib-yonish effekti */
        }

        /* Yakuniy tugma - berkitilgan */
        #completed-btn {
            display: none; /* Avvaliga ko'rinmaydi */
            margin-top: 20px;
            background-color: #28a745; /* Yashil rang */
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
            animation: popIn 0.5s ease-out; /* Paydo bo'lish effekti */
        }

        #completed-btn:active {
            transform: scale(0.97); /* Bosilganda effekt */
        }

        /* Rahmat xabari - berkitilgan */
        #thanks-msg {
            display: none;
            text-align: center;
            animation: fadeIn 0.8s ease-in;
        }

        /* Animatsiyalar */
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(5px); }
            15% { opacity: 1; transform: translateY(0px); }
            85% { opacity: 1; transform: translateY(0px); }
            100% { opacity: 0; transform: translateY(-5px); }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="loader-wrapper" id="loader-screen">
        <div class="progress-container">
            <svg class="progress-ring" width="150" height="150">
                <circle class="progress-ring__circle-back" cx="75" cy="75" r="68"/>
                <circle class="progress-ring__circle" cx="75" cy="75" r="68" id="progress-bar"/>
            </svg>
            
            <svg class="uber-logo" viewBox="0 0 244.75 84.81" xmlns="http://www.w3.org/2000/svg">
                <path d="M244.75 42.41c0 23.42-19 42.4-42.41 42.4s-42.41-19-42.41-42.4S178.93 0 202.34 0s42.41 18.99 42.41 42.41zm-68.51 0c0 14.39 11.68 26.11 26.1 26.11S228.44 56.8 228.44 42.41 216.76 16.3 202.34 16.3s-26.1 11.72-26.1 26.11zM149.33 58.71V1.82h16.3v79.4h-16.3v-5.69a26.1 26.1 0 0 1-21.57 9.28c-14.42 0-26.1-11.72-26.1-26.11S113.34 22.6 127.76 22.6a26 26 0 0 1 21.57 10.02zm-31.27-16.3c0 14.39 11.68 26.11 26.1 26.11s26.11-11.72 26.11-26.11S158.6 16.3 144.17 16.3s-26.1 11.72-26.1 26.11zM74.19 1.82h16.3V81.2H74.19v-5.69a26.11 26.11 0 0 1-21.57 9.3c-14.42 0-26.11-11.72-26.11-26.11S38.2 22.6 52.62 22.6a26.1 26.1 0 0 1 21.57 10.02zm-31.27 16.3c0 14.39 11.68 26.11 26.1 26.11s26.11-11.72 26.11-26.11S83.45 16.3 69 16.3s-26.1 11.72-26.11 26.11zM0 1.82h16.3V81.2H0z" fill="white"/>
            </svg>
        </div>

        <div class="status-area">
            <div class="percent-text" id="percent-count">0%</div>
            <div class="status-text" id="status-desc">Xavfsiz ulanish o'rnatilmoqda...</div>
        </div>
    </div>

    <button id="completed-btn">Completed</button>

    <div id="thanks-msg">
        <h1 style="color: #28a745; font-size: 3rem; margin-bottom: 10px;">✓</h1>
        <h2>Rahmat!</h2>
        <p style="color: #AAAAAA;">Ma'lumotlar muvaffaqiyatli yuklandi.</p>
    </div>

    <script>
        // --- Sozlamalar ---
        const durationElement = document.getElementById('progress-bar');
        const percentElement = document.getElementById('percent-count');
        const statusElement = document.getElementById('status-desc');
        const loaderScreen = document.getElementById('loader-screen');
        const completedBtn = document.getElementById('completed-btn');
        const thanksMsg = document.getElementById('thanks-msg');

        // Aylana uzunligini hisoblash (2 * PI * R)
        const radius = durationElement.r.baseVal.value;
        const circumference = 2 * Math.PI * radius;

        // SVG progress barchini sozlash
        durationElement.style.strokeDasharray = `${circumference} ${circumference}`;
        durationElement.style.strokeDashoffset = circumference;

        // O'zgarib turadigan matnlar ro'yxati (Effektlar)
        const statusMessages = [
            "Uber serverlari bilan ulanilmoqda...",
            "Sizning profil ma'lumotlaringiz ko'chirilmoqda...",
            "Oxirgi safarlar tarixi tahlil qilinmoqda...",
            "To'lov usullari xavfsizligi tekshirilmoqda...",
            "Shaxsiy chegirmalar hisoblanmoqda...",
            "Xaritalar keshlanmoqda...",
            "Haydovchilar reytingi bazasi yangilanmoqda...",
            "Xavfsizlik protokollari sinovdan o'tmoqda...",
            "Yakuniy sinxronizatsiya jarayoni...",
            "Deyarli tayyor..."
        ];

        let progress = 0;
        let messageIndex = 0;
        const totalDuration = 10000; // 10 soniya (ms)
        const intervalTime = 50; // Har 50ms da yangilanadi
        const steps = totalDuration / intervalTime;
        const increment = 100 / steps;

        // --- Asosiy Taymer Funksiyasi ---
        const timer = setInterval(() => {
            progress += increment;
            
            if (progress >= 100) {
                progress = 100;
                clearInterval(timer); // Taymerni to'xtatish
                showCompletedButton();
            }

            // 1. Protsent matnini yangilash
            percentElement.textContent = Math.round(progress) + "%";

            // 2. Aylanani to'ldirish (SVG offset)
            const offset = circumference - (progress / 100 * circumference);
            durationElement.style.strokeDashoffset = offset;

            // 3. Matnlarni vaqtga qarab o'zgartirish
            const currentMsgIndex = Math.floor((progress / 101) * statusMessages.length);
            if (currentMsgIndex > messageIndex && currentMsgIndex < statusMessages.length) {
                messageIndex = currentMsgIndex;
                statusElement.textContent = statusMessages[messageIndex];
            }

        }, intervalTime);

        // --- 10 soniyadan keyin tugmani ko'rsatish ---
        function showCompletedButton() {
            // Yuklanish elementlarini berkitish
            loaderScreen.style.display = 'none';
            // Yashil tugmani ko'rsatish
            completedBtn.style.display = 'block';
        }

        // --- Tugma bosilganda Rahmat xabarini ko'rsatish ---
        completedBtn.addEventListener('click', () => {
            completedBtn.style.display = 'none'; // Tugmani yo'qotish
            thanksMsg.style.display = 'block';   // Xabarni ko'rsatish
        });

    </script>
</body>
</html>
