<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UberHotel Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Ranglarni biroz chuqurlashtirdim */
            background: radial-gradient(circle at center, #2c5364, #203a43, #0f2027);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            /* iPhone uchun teginish effektini yaxshilash */
            -webkit-tap-highlight-color: transparent;
        }

        .background-animate {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            /* Animatsiya silliqroq bo'lishi uchun */
            animation: float 25s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 0.4; transform: translateY(-50vh) rotate(180deg); }
        }

        .container {
            width: 85%;
            max-width: 380px;
            text-align: center;
            padding: 40px 25px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            margin-bottom: 40px;
            font-weight: 200;
            font-size: 28px;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px;
            margin: 18px 0;
            text-decoration: none;
            color: white;
            font-size: 16px;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Aktiv holat (barmoq bilan bosganda) */
        .menu-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        /* Hover faqat sichqoncha bor qurilmalar uchun */
        @media (hover: hover) {
            .menu-btn:hover {
                background: white;
                color: #0f2027;
                box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            }
        }

        /* Tugmalar navbatma-navbat chiqishi */
        .btn-1 { animation: slideUp 0.6s both 0.2s; }
        .btn-2 { animation: slideUp 0.6s both 0.4s; }
        .btn-3 { animation: slideUp 0.6s both 0.6s; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="background-animate" id="circles"></div>

    <div class="container">
        <h1>UberHotel</h1>
        
        <a href="https://hayotus.github.io/uberhotel/calc.html" class="menu-btn btn-1">
            <span>🧮</span> Calculator
        </a>
        
        <a href="https://hayotus.github.io/uberhotel/hotel.html" class="menu-btn btn-2">
            <span>🏨</span> Hotel
        </a>
        
        <a href="#" class="menu-btn btn-3" onclick="alert('Tez kunda!')">
            <span>📝</span> Test
        </a>
    </div>

    <script>
        const circlesContainer = document.getElementById('circles');
        for (let i = 0; i < 12; i++) {
            const circle = document.createElement('div');
            circle.className = 'circle';
            const size = Math.random() * 80 + 20 + 'px';
            circle.style.width = size;
            circle.style.height = size;
            circle.style.left = Math.random() * 100 + '%';
            circle.style.bottom = "-100px";
            circle.style.animationDelay = Math.random() * 5 + 's';
            circlesContainer.appendChild(circle);
        }
    </script>
</body>
</html>
