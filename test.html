<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uber Parallel Progress</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000000;
            font-family: -apple-system, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Aylana progress */
        .circle-box {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .progress-ring {
            position: absolute;
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            stroke: #FFFFFF;
            stroke-width: 6;
            fill: transparent;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear;
        }

        /* O'zgartirilgan rasm qismi */
        .uber-logo {
            width: 80px;
            height: auto;
            z-index: 10;
            object-fit: contain;
        }

        /* Foiz matni */
        #percent-display {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* Gorizontal progress bar */
        .horizontal-bar-container {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        #horizontal-fill {
            height: 100%;
            width: 0%;
            background: #28a745; 
            transition: width 0.1s linear;
        }

        /* Xabarlar logi */
        .log-container {
            width: 100%;
            height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid #111;
            padding-top: 15px;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            animation: fadeIn 0.3s forwards;
        }

        .check { color: #28a745; }

        #complete-btn {
            display: none;
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }

        #final-msg {
            display: none;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container" id="main-ui">
        <div class="circle-box">
            <svg class="progress-ring" width="180" height="180">
                <circle cx="90" cy="90" r="85" stroke="#222" stroke-width="6" fill="transparent"/>
                <circle id="circle-progress" class="progress-ring__circle" cx="90" cy="90" r="85"/>
            </svg>
            <img src="src/uber.jpg" class="uber-logo" alt="Uber Logo">
        </div>

        <div id="percent-display">0%</div>

        <div class="horizontal-bar-container">
            <div id="horizontal-fill"></div>
        </div>

        <div class="log-container" id="logs"></div>

        <button id="complete-btn">Completed</button>
    </div>

    <div id="final-msg">
        <h1 style="color:#28a745">✓</h1>
        <h2>Rahmat!</h2>
        <p>Jarayon muvaffaqiyatli yakunlandi.</p>
    </div>

    <script>
        const circle = document.getElementById('circle-progress');
        const horizontal = document.getElementById('horizontal-fill');
        const percentText = document.getElementById('percent-display');
        const logs = document.getElementById('logs');
        const btn = document.getElementById('complete-btn');
        
        const radius = circle.r.baseVal.value;
        const circumference = 2 * Math.PI * radius;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;

        const messages = [
            "Uber bazasiga ulanish...",
            "Shaxsiy ma'lumotlar tekshirilmoqda...",
            "Safar hujjatlari ko'chirilmoqda...",
            "Analiz jarayoni boshlandi...",
            "GPS nuqtalari yuklanmoqda...",
            "Tranzaksiyalar sinxronlanmoqda...",
            "Reyting tizimi yangilanmoqda...",
            "Xavfsizlik protokoli faol...",
            "Bulutli saqlashga yozilmoqda...",
            "Yakuniy tekshiruv..."
        ];

        let progress = 0;
        let taskIndex = 0;

        const interval = setInterval(() => {
            progress += 1;
            percentText.textContent = progress + "%";

            const offset = circumference - (progress / 100 * circumference);
            circle.style.strokeDashoffset = offset;

            horizontal.style.width = progress + "%";

            if (progress % 10 === 0 && taskIndex < messages.length) {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `<span>${messages[taskIndex]}</span><span class="check">✓</span>`;
                logs.appendChild(item);
                logs.scrollTop = logs.scrollHeight;
                taskIndex++;
            }

            if (progress >= 100) {
                clearInterval(interval);
                btn.style.display = 'block';
            }
        }, 100);

        btn.addEventListener('click', () => {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('final-msg').style.display = 'block';
        });
    </script>
</body>
</html>
