<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UberHotel Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #2c5364, #203a43, #0f2027);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        /* Orqa fondagi suzuvchi pufakchalar */
        .background-animate {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float Up 20s infinite ease-in-out;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        .container {
            width: 88%;
            max-width: 380px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
            text-align: center;
            animation: entrance 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes entrance {
            from { opacity: 0; transform: scale(0.8) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            font-weight: 200;
            font-size: 32px;
            letter-spacing: 6px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            text-decoration: none;
            color: white;
            font-size: 17px;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* iPhoneda bosish effekti */
        .menu-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Tugmalarning chiqib kelishi */
        .btn-1 { animation: slide 0.7s both 0.3s; }
        .btn-2 { animation: slide 0.7s both 0.5s; }
        .btn-3 { animation: slide 0.7s both 0.7s; }

        @keyframes slide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="background-animate" id="circles"></div>

    <div class="container">
        <h1>UberHotel</h1>
        
        <a href="https://hayotus.github.io/uberhotel/calc.html" class="menu-btn btn-1">
            <span class="icon">🧮</span> Calculator
        </a>
        
        <a href="https://hayotus.github.io/uberhotel/hotel.html" class="menu-btn btn-2">
            <span class="icon">🏨</span> Hotel
        </a>
        
        <a href="https://hayotus.github.io/uberhotel/test.html" class="menu-btn btn-3">
            <span class="icon">📝</span> Test
        </a>
    </div>

    <script>
        const circlesContainer = document.getElementById('circles');
        function createCircle() {
            const circle = document.createElement('div');
            circle.className = 'circle';
            const size = Math.random() * 60 + 15 + 'px';
            circle.style.width = size;
            circle.style.height = size;
            circle.style.left = Math.random() * 100 + '%';
            circle.style.bottom = "-100px";
            circle.style.animationDuration = Math.random() * 10 + 10 + 's';
            circle.style.animationDelay = Math.random() * 5 + 's';
            circlesContainer.appendChild(circle);
        }
        
        for (let i = 0; i < 15; i++) {
            createCircle();
        }
    </script>
</body>
</html>
